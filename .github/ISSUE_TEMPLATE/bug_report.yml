---
name: Bug Report
description: Report a bug with the Terraform Provider for Balena Cloud
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

        > **Important:** This provider is a reflection of the [Balena API](https://docs.balena.io/reference/api/resources).
        > Before submitting, please verify that the behavior you're reporting is not a Balena API issue.
        > If the bug exists in the API itself, please report it to Balena directly — not here.

  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      placeholder: "1.9.0"
    validations:
      required: true

  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Terraform Configuration
      description: The relevant `.tf` configuration that reproduces the issue.
      render: hcl
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or output.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      value: |
        1. `terraform init`
        2. `terraform apply`
        3. ...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (debug logs, screenshots, etc.)
