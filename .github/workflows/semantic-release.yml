name: Semantic Versioning and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  semantic-release:
    name: Semantic Versioning and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOUSEKEEPING_BOT_APP_ID }}
          private-key: ${{ secrets.HOUSEKEEPING_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Run semantic-release
        id: release
        uses: alchemaxinc/composite-toolbox/semantic-release@v1
        with:
          token: ${{ steps.app.outputs.token }}

  goreleaser:
    name: Build and Publish Provider
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.tag != '' && github.ref == 'refs/heads/main'

    environment: production

    permissions:
      contents: write

    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOUSEKEEPING_BOT_APP_ID }}
          private-key: ${{ secrets.HOUSEKEEPING_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - &checkout-code-full
        name: Checkout code (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  semantic-release-flowing-tags:
    name: Add flowing tags
    runs-on: ubuntu-latest
    needs: [semantic-release, goreleaser]
    if: needs.semantic-release.outputs.tag != '' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - *checkout-code-full

      - name: Extract version tag
        id: major-minor-tags
        run: |
          TAG="${{ needs.semantic-release.outputs.tag }}"
          VERSION=${TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Push major tag
        env: &github-token-env
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.semantic-release.outputs.tag }}"
          MAJOR="${{ steps.major-minor-tags.outputs.major }}"
          MAJOR_TAG="v$MAJOR"
          git tag -f "$MAJOR_TAG" "$TAG"
          git push origin "$MAJOR_TAG" --force

      - name: Push minor tag
        env: *github-token-env
        run: |
          TAG="${{ needs.semantic-release.outputs.tag }}"
          MAJOR="${{ steps.major-minor-tags.outputs.major }}"
          MINOR="${{ steps.major-minor-tags.outputs.minor }}"
          MINOR_TAG="v$MAJOR.$MINOR"
          git tag -f "$MINOR_TAG" "$TAG"
          git push origin "$MINOR_TAG" --force
