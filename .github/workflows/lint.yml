name: Lint

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PRETTIER_VERSION: "3.3.3"
  COMMITLINT_CLI_VERSION: "20.2.0"
  TFPLUGINDOCS_VERSION: "0.24.0"

jobs:
  install-commitlint:
    runs-on: ubuntu-latest
    steps:
      - &checkout-code
        name: Checkout code (shallow)
        uses: actions/checkout@v6

      - &cache-commitlint
        name: Cache Commitlint
        id: cache-commitlint
        uses: actions/cache@v5
        with:
          path: node_modules
          key: v4-commitlint-${{ env.COMMITLINT_CLI_VERSION }}

      - name: Install Commitlint
        if: steps.cache-commitlint.outputs.cache-hit != 'true'
        run: npm i -D @commitlint/cli@${{ env.COMMITLINT_CLI_VERSION }} @commitlint/config-conventional

  run-commitlint:
    runs-on: ubuntu-latest
    needs: install-commitlint
    steps:
      - name: Checkout code (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - *cache-commitlint

      - name: Run commitlint
        run: |
          git checkout main
          git checkout -
          ./node_modules/.bin/commitlint --from main --to HEAD --verbose

  install-prettier:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - &cache-prettier
        name: Cache Prettier
        id: cache-prettier
        uses: actions/cache@v5
        with:
          path: node_modules
          key: v1-prettier-${{ env.PRETTIER_VERSION }}

      - name: Install Prettier
        if: steps.cache-prettier.outputs.cache-hit != 'true'
        run: npm i -D prettier@${{ env.PRETTIER_VERSION }}

  run-prettier:
    runs-on: ubuntu-latest
    needs: install-prettier
    steps:
      - *checkout-code
      - *cache-prettier

      - name: Run Prettier check
        run: ./node_modules/.bin/prettier --check .

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - &setup-go
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code
      - *setup-go

      - &setup-terraform
        name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Build provider
        run: go install .

      - name: Configure dev overrides
        run: |
          cat > ~/.terraformrc <<EOF
          provider_installation {
            dev_overrides {
              "alchemaxinc/balena" = "$(go env GOPATH)/bin"
            }
            direct {}
          }
          EOF

      - name: Validate example configs
        env:
          TF_CLI_ARGS: "-no-color"
        run: |
          failed=0
          for dir in $(find examples -name '*.tf' -exec dirname {} \; | sort -u); do
            # Skip provider dir — it already has its own required_providers block
            if [ "$dir" = "examples/provider" ]; then
              continue
            fi
            # Inject provider config so Terraform resolves alchemaxinc/balena
            cp examples/provider/provider.tf "$dir/_provider.tf"
            output=$(cd "$dir" && terraform validate 2>&1) || {
              echo "::error::Validation failed for $dir"
              echo "$output"
              failed=1
            }
            rm "$dir/_provider.tf"
          done
          exit $failed

  install-tfplugindocs:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code
      - *setup-go

      - &cache-tfplugindocs
        name: Cache tfplugindocs
        id: cache-tfplugindocs
        uses: actions/cache@v5
        with:
          path: ~/go/bin/tfplugindocs
          key: v1-tfplugindocs-${{ env.TFPLUGINDOCS_VERSION }}

      - name: Install tfplugindocs
        if: steps.cache-tfplugindocs.outputs.cache-hit != 'true'
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v${{ env.TFPLUGINDOCS_VERSION }}

  update-docs:
    runs-on: ubuntu-latest
    needs: install-tfplugindocs
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout and configure git
        uses: alchemaxinc/composite-toolbox/checkout-and-setup@v1
        with:
          ref: ${{ github.head_ref }}

      - *setup-go
      - *cache-tfplugindocs

      - name: Generate and format docs
        run: |
          $(go env GOPATH)/bin/tfplugindocs generate --provider-name=balena
          npx prettier@${{ env.PRETTIER_VERSION }} --write docs/

      - name: Commit updated docs
        run: |
          git add docs/
          git diff --cached --quiet && exit 0
          git commit -m "docs: auto-generate provider documentation"
          git push

  lint-passed:
    runs-on: ubuntu-latest
    if: always()
    needs: [run-commitlint, run-prettier, go-lint, validate-examples, update-docs]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=(
            "${{ needs.run-commitlint.result }}"
            "${{ needs.run-prettier.result }}"
            "${{ needs.go-lint.result }}"
            "${{ needs.validate-examples.result }}"
            "${{ needs.update-docs.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
