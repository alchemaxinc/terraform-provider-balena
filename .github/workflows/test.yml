name: Test

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - &checkout-code
        name: Checkout code (shallow)
        uses: actions/checkout@v6

      - &setup-go
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run unit tests
        run: make test-unit

  build:
    runs-on: ubuntu-latest

    steps:
      - *checkout-code
      - *setup-go

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  acceptance-test:
    runs-on: ubuntu-latest
    needs: [unit-test, build]
    if: >-
      github.event_name == 'workflow_call'
      || !startsWith(github.event.pull_request.title, 'chore')

    environment: ${{ github.event_name == 'workflow_call' && 'production' || 'development' }}

    steps:
      - *checkout-code
      - *setup-go

      - name: Run integration tests
        env:
          TF_ACC: "1"
          BALENA_API_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: make test-integration

  tests-passed:
    runs-on: ubuntu-latest
    if: always()
    needs: [unit-test, build, acceptance-test]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=(
            "${{ needs.unit-test.result }}"
            "${{ needs.build.result }}"
            "${{ needs.acceptance-test.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
